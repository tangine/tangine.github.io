nav:
  - 首页: index.md
  - 职业发展:
    - CSS: career/css.md
    - JavaScript: career/javascript.md
    - Vue: career/vue.md
  - 经济金融:
      - 股市风云: finance/stock.md
  - 公考笔记:
    - 政治理论: servant/politics.md
    - 常识判断: servant/horsesense.md
    - 言语理解与表达: servant/chinese.md
    - 数量关系: servant/math.md
    - 判断推理: servant/logic.md
    - 资料分析: servant/analysis.md
    - 申论: servant/essay.md
  - 其他:
    - 个人发展: other/growth.md
