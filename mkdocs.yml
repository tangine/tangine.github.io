theme:
#  name: mkdocs
#  locale: zh
  name: material
  language: zh
  favicon: assets/images/favicon.svg
  features:
    # 导航功能
    - navigation.tabs           # 顶部标签页
    - navigation.tabs.sticky    # 固定标签页
    - navigation.sections       # 导航分组
    - navigation.expand         # 展开所有导航
    - navigation.top            # 回到顶部按钮
    - navigation.instant        # 即时加载页面
    - navigation.tracking       # 地址栏追踪锚点
    - navigation.indexes        # 分组主页
    - navigation.footer

    # 搜索功能
    - search.highlight          # 搜索高亮
    - search.share             # 搜索分享
    - search.suggest           # 搜索建议

    # 内容功能
    - content.tabs.link        # 内容标签页链接
    - content.code.copy        # 代码复制按钮
    - content.code.annotate    # 代码注释
    - content.action.edit      # 编辑此页
    - content.action.view      # 查看源码

    # 头部功能
    - header.autohide          # 滚动时自动隐藏头部

    # 表格功能
    - content.table            # 表格排序

#    - toc.integrate    # 集成目录
    - toc.follow      # 目录跟随

  collapse_navigation: true

  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式


  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  # Python Markdown
  - mdx_truly_sane_lists        # 多级列表
  - meta
  - toc:
      permalink: true
      toc_depth: 4
  - tables
  - attr_list
  - def_list
  - md_in_html
  - footnotes

  # Python Markdown Extensions
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
#    - pymdownx.tasklist
#    - pymdownx.emoji
#    - pymdownx.mark
#    - pymdownx.critic
#    - pymdownx.keys
#    - pymdownx.tilde
#    - pymdownx.caret
#    - pymdownx.details
#    - pymdownx.magiclink
#    - pymdownx.tabbed:
#        alternate_style: true


extra:
  alternate:
    - name: 简体中文
      link: /
      lang: zh